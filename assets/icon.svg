  <!-- v8: iOS app icon stijl — squircle, gradient, gevuld schild, MCM-tekst -->
  <defs>
    <linearGradient id="mcmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#824131"/>
      <stop offset="1" stop-color="#E78E46"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- iOS squircle achtergrond met MCM gradient -->
  <rect x="0" y="0" width="256" height="256" rx="57" ry="57" fill="url(#mcmGrad)"/>

